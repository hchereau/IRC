name: ft_irc CI

on:
  pull_request:
    branches: [ "main" ]

jobs:
  unit-testing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile Tests
        run: make test

      - name: Execute Unit Tests
        run: ./irc_tests

  build-and-test:
    runs-on: ubuntu-latest
  
    steps:
      - uses: actions/checkout@v4
      
      - name: Build and Run C++ Unit Tests
        run: |
          make test
          ./irc_tests
          
      - name: Run Python Integration Tests
        run: make test_integration
  
  valgrind-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y valgrind psmisc # psmisc installe fuser pour le Makefile

      - name: Run Valgrind Integration Tests
        run: make test_valgrind